{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости | ЭКО-ШКОЛА №59</title>
    <link rel="stylesheet" href="{% static 'assets/css/main.css' %}">
</head>
<body>
    <div id="page-loader"><div class="loader-leaf"></div></div>
    <div class="toast-container" id="toast-container"></div>
    <button id="back-to-top">↑</button>

    <nav class="navbar" id="navbar">
        <a href="{% url 'home' %}" class="nav-logo"><span class="logo-icon">🌿</span><span>ЭКО-ШКОЛА №59</span></a>
        <ul class="nav-links" id="nav-links">
            <li><a href="{% url 'about' %}">О проекте</a></li>
            <li><a href="{% url 'eco_patrol' %}">Эко-Патруль</a></li>
            <li><a href="{% url 'tree_map' %}">Карта деревьев</a></li>
            <li><a href="{% url 'monitoring' %}">Мониторинг</a></li>
            <li><a href="{% url 'news' %}" class="active">Новости</a></li>
            <li><a href="{% url 'gallery' %}">Галерея</a></li>
            <li><a href="{% url 'participants' %}">Участники</a></li>
            <li><a href="{% url 'documents' %}">Документы</a></li>
            <li><a href="{% url 'achievements' %}">Достижения</a></li>
            <li><a href="{% url 'contacts' %}">Контакты</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle" id="theme-toggle">🌓</button>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <main class="section" style="padding-top:calc(var(--navbar-height) + 2rem);">
        <div class="section-header reveal">
            <span class="section-tag">Новости</span>
            <h2>Лента новостей проекта</h2>
            <div class="section-line"></div>
        </div>
        <div class="news-controls reveal">
            <input type="text" id="news-search" placeholder="🔍 Поиск по новостям...">
            <select id="news-filter-cat">
                <option value="all">Все категории</option>
                <option value="Акция">Акции</option>
                <option value="Посадка">Посадки</option>
                <option value="Обучение">Обучение</option>
                <option value="Партнерство">Партнерство</option>
            </select>
        </div>
        <div class="news-grid" id="news-grid"></div>
    </main>

    <footer class="site-footer"> ... </footer>
    <script>
        (function() {
            // ... shared JS ...
            const newsGrid = document.getElementById('news-grid');
            if (newsGrid) {
                const newsData = [
                    { title:'Посадили 200 новых деревьев!', date:'2025-03-15', cat:'Посадка', excerpt:'Ученики и волонтеры высадили 200 саженцев на территории школы.' },
                    { title:'Эко-урок для начальных классов', date:'2025-03-10', cat:'Обучение', excerpt:'Провели интерактивный урок о важности переработки отходов.' },
                    { title:'Субботник в городском парке', date:'2025-02-28', cat:'Акция', excerpt:'Более 100 участников очистили парк от мусора.' },
                    { title:'Новый партнер — Green KG', date:'2025-02-20', cat:'Партнерство', excerpt:'Подписали соглашение о сотрудничестве с экологической организацией.' },
                    { title:'Мастер-класс по компостированию', date:'2025-02-05', cat:'Обучение', excerpt:'Научились создавать компост из органических отходов.' },
                    { title:'Акция «Чистый Ош»', date:'2025-01-25', cat:'Акция', excerpt:'Присоединились к общегородской экологической акции.' }
                ];
                const newsSearch = document.getElementById('news-search');
                const newsFilterCat = document.getElementById('news-filter-cat');

                function renderNews(searchTerm='', catFilter='all'){
                    newsGrid.innerHTML='';
                    const filtered = newsData.filter(n=>{
                        const matchSearch = n.title.toLowerCase().includes(searchTerm.toLowerCase()) || n.excerpt.toLowerCase().includes(searchTerm.toLowerCase());
                        const matchCat = catFilter==='all' || n.cat===catFilter;
                        return matchSearch && matchCat;
                    });
                    if(filtered.length===0){
                        newsGrid.innerHTML='<p style="text-align:center;color:var(--text-light);grid-column:1/-1;">Новостей не найдено</p>';
                        return;
                    }
                    filtered.forEach(n=>{
                        const card=document.createElement('div');
                        card.className='card news-card reveal';
                        card.innerHTML=`<div class="news-img-placeholder">📰</div><div class="news-body"><span class="news-cat">${n.cat}</span><span class="news-date">${n.date}</span><h4>${n.title}</h4><p style="font-size:0.9rem;color:var(--text-secondary);">${n.excerpt}</p></div>`;
                        newsGrid.appendChild(card);
                        if (window.revealObserver) revealObserver.observe(card);
                        else { /* manual reveal if needed */ }
                    });
                }
                renderNews();
                newsSearch.addEventListener('input', ()=> renderNews(newsSearch.value, newsFilterCat.value));
                newsFilterCat.addEventListener('change', ()=> renderNews(newsSearch.value, newsFilterCat.value));
            }
        })();
    </script>
<script src="{% static 'assets/js/main.js' %}"></script>
</body>
</html>
