{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея | ЭКО-ШКОЛА №59</title>
    <link rel="stylesheet" href="{% static 'assets/css/main.css' %}">
</head>
<body>
    <div id="page-loader"><div class="loader-leaf"></div></div>
    <div class="toast-container" id="toast-container"></div>
    <button id="back-to-top">↑</button>

    <nav class="navbar" id="navbar">
        <a href="{% url 'home' %}" class="nav-logo"><span class="logo-icon">🌿</span><span>ЭКО-ШКОЛА №59</span></a>
        <ul class="nav-links" id="nav-links">
            <li><a href="{% url 'about' %}">О проекте</a></li>
            <li><a href="{% url 'eco_patrol' %}">Эко-Патруль</a></li>
            <li><a href="{% url 'tree_map' %}">Карта деревьев</a></li>
            <li><a href="{% url 'monitoring' %}">Мониторинг</a></li>
            <li><a href="{% url 'news' %}">Новости</a></li>
            <li><a href="{% url 'gallery' %}" class="active">Галерея</a></li>
            <li><a href="{% url 'participants' %}">Участники</a></li>
            <li><a href="{% url 'documents' %}">Документы</a></li>
            <li><a href="{% url 'achievements' %}">Достижения</a></li>
            <li><a href="{% url 'contacts' %}">Контакты</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle" id="theme-toggle">🌓</button>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <main class="section" style="padding-top:calc(var(--navbar-height) + 2rem);">
        <div class="section-header reveal">
            <span class="section-tag">Галерея</span>
            <h2>Фото проекта</h2>
            <div class="section-line"></div>
        </div>
        <div class="gallery-filters reveal">
            <button class="active" data-gallery-filter="all">📷 Все фото</button>
            <button data-gallery-filter="before">🏚️ До проекта</button>
            <button data-gallery-filter="planting">🌱 Посадка</button>
            <button data-gallery-filter="events">🎉 Мероприятия</button>
        </div>
        <div class="gallery-grid" id="gallery-grid"></div>
    </main>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightbox-close">✕</button>
            <span id="lightbox-emoji">📷</span>
            <p id="lightbox-caption" style="margin-top:0.5rem;color:var(--text-secondary);font-size:0.9rem;"></p>
        </div>
    </div>

    <footer class="site-footer"> ... </footer>
    <script>
        (function() {
            // ... shared JS ...
            const galleryGrid = document.getElementById('gallery-grid');
            if (galleryGrid) {
                const items = [
                    { emoji:'🏚️', caption:'Территория до проекта', cat:'before' },
                    { emoji:'🌱', caption:'Посадка саженцев', cat:'planting' },
                    { emoji:'🎉', caption:'Эко-фестиваль 2024', cat:'events' },
                    { emoji:'🏚️', caption:'Пустырь до озеленения', cat:'before' },
                    { emoji:'🌱', caption:'Ученики сажают деревья', cat:'planting' },
                    { emoji:'🎉', caption:'День Земли', cat:'events' },
                    { emoji:'🌱', caption:'Полив саженцев', cat:'planting' },
                    { emoji:'🎉', caption:'Награждение волонтеров', cat:'events' },
                    { emoji:'🏚️', caption:'Старый двор школы', cat:'before' },
                    { emoji:'🌱', caption:'Новая аллея', cat:'planting' },
                    { emoji:'🎉', caption:'Субботник', cat:'events' },
                    { emoji:'🏚️', caption:'Заброшенный участок', cat:'before' }
                ];
                let activeFilter = 'all';
                function renderGallery(filter){
                    galleryGrid.innerHTML='';
                    const filtered = filter==='all' ? items : items.filter(i=>i.cat===filter);
                    filtered.forEach(g=>{
                        const item=document.createElement('div');
                        item.className='gallery-item reveal';
                        item.innerHTML=`${g.emoji}<div class="gallery-overlay">🔍</div>`;
                        item.addEventListener('click', ()=> openLightbox(g.emoji, g.caption));
                        galleryGrid.appendChild(item);
                        if (window.revealObserver) revealObserver.observe(item);
                    });
                }
                renderGallery('all');
                document.querySelectorAll('.gallery-filters button').forEach(btn=>{
                    btn.addEventListener('click', ()=>{
                        document.querySelectorAll('.gallery-filters button').forEach(b=>b.classList.remove('active'));
                        btn.classList.add('active');
                        renderGallery(btn.dataset.galleryFilter);
                    });
                });

                const lightbox = document.getElementById('lightbox');
                const lightboxEmoji = document.getElementById('lightbox-emoji');
                const lightboxCaption = document.getElementById('lightbox-caption');
                function openLightbox(emoji, caption){
                    lightboxEmoji.textContent=emoji;
                    lightboxCaption.textContent=caption;
                    lightbox.classList.add('active');
                }
                document.getElementById('lightbox-close').addEventListener('click', ()=> lightbox.classList.remove('active'));
                lightbox.addEventListener('click', e=>{ if(e.target===lightbox) lightbox.classList.remove('active'); });
                document.addEventListener('keydown', e=>{ if(e.key==='Escape') lightbox.classList.remove('active'); });
            }
        })();
    </script>
    <script src="{% static 'assets/js/main.js' %}"></script>

</body>
</html>
